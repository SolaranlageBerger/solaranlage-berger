<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden — Solaranlage Berger</title>
  <meta name="description" content="Die gesuchte Seite konnte leider nicht gefunden werden.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="css/styles.css?v=9">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2744 0%, #111b30 100%);
      color: #fff;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    body::before {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245,158,11,0.25) 0%, transparent 60%);
      top: -100px;
      right: -100px;
    }
    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, transparent 60%);
      bottom: -100px;
      left: -100px;
    }
    .err-wrap {
      position: relative;
      max-width: 560px;
      text-align: center;
      z-index: 1;
    }
    .err-sun {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      animation: spin 30s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .err-code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .err-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }
    .err-text {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .err-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .err-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .err-btn-primary {
      background: #f59e0b;
      color: #fff;
      box-shadow: 0 6px 20px rgba(245,158,11,0.4);
    }
    .err-btn-primary:hover {
      background: #d97706;
      transform: translateY(-2px);
    }
    .err-btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
    }
    .err-btn-secondary:hover {
      background: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div class="err-wrap">
    <svg class="err-sun" viewBox="0 0 96 96" aria-hidden="true">
      <circle cx="48" cy="48" r="20" fill="#f59e0b"/>
      <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round">
        <line x1="48" y1="6" x2="48" y2="20"/>
        <line x1="48" y1="76" x2="48" y2="90"/>
        <line x1="6" y1="48" x2="20" y2="48"/>
        <line x1="76" y1="48" x2="90" y2="48"/>
        <line x1="18.4" y1="18.4" x2="28.3" y2="28.3"/>
        <line x1="67.7" y1="67.7" x2="77.6" y2="77.6"/>
        <line x1="18.4" y1="77.6" x2="28.3" y2="67.7"/>
        <line x1="67.7" y1="28.3" x2="77.6" y2="18.4"/>
      </g>
    </svg>
    <div class="err-code">404</div>
    <h1 class="err-title">Diese Seite ist leider nicht erreichbar</h1>
    <p class="err-text">Die gesuchte Seite existiert nicht oder wurde verschoben. Vielleicht möchten Sie zurück zur Startseite — oder direkt mit uns Kontakt aufnehmen?</p>
    <div class="err-actions">
      <a href="/" class="err-btn err-btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Zur Startseite
      </a>
      <a href="/index.html#kontakt" class="err-btn err-btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Kontakt
      </a>
    </div>
  </div>
</body>
</html>
